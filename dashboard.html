              setIsOpen(!isOpen);
            }}
            className={`brutal-border-thin ${isDark ? 'bg-yellow-200' : 'bg-yellow-100'} text-black px-4 md:px-6 py-2 md:py-3 rounded-full font-black hard-shadow-hover transition-all text-sm md:text-base min-h-[44px] w-full sm:w-auto`}
          >
            ESCALATE
          </button>
          {isOpen && (
            <div className={`absolute right-0 mt-2 ${isDark ? 'bg-gray-800' : 'bg-white'} brutal-border rounded-xl hard-shadow z-50 min-w-[220px]`}>
              <button
                onClick={() => handleEscalate('Finance')}
                className={`w-full px-4 py-3 text-left ${isDark ? 'hover:bg-gray-700' : 'hover:bg-blue-50'} brutal-border-b-2 last:border-b-0 font-bold flex items-center space-x-3`}
              >
                <div className="w-8 h-8 bg-green-200 brutal-border-thin rounded-lg flex items-center justify-center">
                  <span className="text-sm font-black">$</span>
                </div>
                <span>Finance</span>
              </button>
              <button
                onClick={() => handleEscalate('Procurement')}
                className={`w-full px-4 py-3 text-left ${isDark ? 'hover:bg-gray-700' : 'hover:bg-blue-50'} brutal-border-b-2 last:border-b-0 font-bold flex items-center space-x-3`}
              >
                <div className="w-8 h-8 bg-blue-200 brutal-border-thin rounded-lg flex items-center justify-center">
                  <span className="text-sm font-black">P</span>
                </div>
                <span>Procurement</span>
              </button>
              <button
                onClick={() => handleEscalate('LegalOps')}
                className={`w-full px-4 py-3 text-left ${isDark ? 'hover:bg-gray-700' : 'hover:bg-blue-50'} brutal-border-b-2 last:border-b-0 font-bold flex items-center space-x-3`}
              >
                <div className="w-8 h-8 bg-purple-200 brutal-border-thin rounded-lg flex items-center justify-center">
                  <span className="text-sm font-black">L</span>
                </div>
                <span>LegalOps</span>
              </button>
            </div>
          )}
        </div>
      );
    };

    const DetailDrawer = ({ contract, isOpen, onClose, isDark }) => {
      const [notes, setNotes] = useState(contract?.notes || '');

      useEffect(() => {
        if (contract) {
          setNotes(contract.notes || '');
        }
      }, [contract]);

      const handleOverlayClick = (e) => {
        if (e.target === e.currentTarget) {
          onClose();
        }
      };

      if (!isOpen || !contract) {
        return null;
      }

      return (
        <>
          <div
            className="fixed inset-0 bg-black bg-opacity-50 z-40"
            onClick={handleOverlayClick}
          />
          <div className={`fixed right-0 top-0 h-full w-full md:w-1/2 lg:w-1/3 ${isDark ? 'bg-gray-800' : 'bg-white'} brutal-border-l-4 z-40 overflow-y-auto hard-shadow transition-colors`} onClick={(e) => e.stopPropagation()}>
            <div className="p-4 md:p-6 space-y-6 md:space-y-8">
            <div className={`sticky top-0 ${isDark ? 'bg-yellow-200' : 'bg-yellow-100'} brutal-border-b-4 px-4 md:px-6 py-3 md:py-4 flex items-center justify-between`}>
              <h2 className="font-brutal text-lg md:text-2xl text-black truncate pr-2">{contract.name.toUpperCase()}</h2>
              <button
                onClick={onClose}
                className="brutal-border-thin bg-white p-2 rounded-lg hard-shadow-hover transition-all min-w-[44px] min-h-[44px] flex-shrink-0"
                aria-label="Close"
              >
                <svg className="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
              <section className={`${isDark ? 'bg-gray-800' : 'bg-blue-50'} brutal-border rounded-xl md:rounded-2xl p-4 md:p-6 hard-shadow`}>
                <h3 className="font-brutal text-base md:text-xl mb-4 thick-rule pb-4">TIMELINE</h3>
                <div>
                  {contract.timeline.steps.map((step, index) => (
                    <TimelineStep
                      key={index}
                      step={step}
                      isLast={index === contract.timeline.steps.length - 1}
                      isDark={isDark}
                    />
                  ))}
                </div>
              </section>
              <section className={`${isDark ? 'bg-gray-800' : 'bg-green-50'} brutal-border rounded-xl md:rounded-2xl p-4 md:p-6 hard-shadow`}>
                <h3 className="font-brutal text-base md:text-xl mb-4 thick-rule pb-4">INTEGRATIONS</h3>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-3">
                  {contract.integrations.map((integration, index) => (
                    <IntegrationButton key={index} name={integration} />
                  ))}
                </div>
              </section>
              {contract.playbook && contract.playbook.relevant && (
                <section className={`${isDark ? 'bg-gray-800' : 'bg-orange-50'} brutal-border rounded-xl md:rounded-2xl p-4 md:p-6 hard-shadow`}>
                  <h3 className="font-brutal text-base md:text-xl mb-4 thick-rule pb-4">RELEVANT PLAYBOOK</h3>
                  {contract.playbook.applicablePlaybooks && contract.playbook.applicablePlaybooks.length > 0 && (
                    <div className={`${isDark ? 'bg-gray-900' : 'bg-white'} brutal-border-thin rounded-lg p-4 mb-4`}>
                      <div className={`text-sm font-bold ${isDark ? 'text-gray-300' : 'text-gray-600'} mb-2`}>APPLICABLE PLAYBOOKS:</div>
                      <div className="flex flex-wrap gap-2">
                        {contract.playbook.applicablePlaybooks.map((playbook, index) => (
                          <span key={index} className={`px-3 py-1 rounded-full text-xs font-black brutal-border-thin ${isDark ? 'bg-blue-900 text-white' : 'bg-blue-100 text-black'}`}>
                            {playbook}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  {contract.playbook.updatesNeeded && contract.playbook.updatesNeeded.length > 0 ? (
                    <div className="space-y-3">
                      <div className={`${isDark ? 'bg-red-900' : 'bg-red-100'} brutal-border-thin rounded-lg p-4`}>
                        <div className={`font-black mb-2 flex items-center space-x-2 ${isDark ? 'text-red-200' : 'text-red-800'}`}>
                          <span>⚠️</span>
                          <span>UPDATES NEEDED</span>
                        </div>
                        <ul className="space-y-2">
                          {contract.playbook.updatesNeeded.map((update, index) => (
                            <li key={index} className="flex items-start">
                              <span className={`font-black mr-2 ${isDark ? 'text-red-200' : 'text-red-800'}`}>•</span>
                              <span className={`font-medium ${isDark ? 'text-gray-300' : 'text-gray-800'}`}>{update}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                      <button className="brutal-border-thin bg-black text-white px-6 py-3 rounded-full font-black hard-shadow-hover transition-all w-full">
                        UPDATE PLAYBOOK
                      </button>
                    </div>
                  ) : (
                    <div className={`${isDark ? 'bg-green-900' : 'bg-green-100'} brutal-border-thin rounded-lg p-4`}>
                      <div className={`font-black ${isDark ? 'text-green-200' : 'text-green-800'}`}>✓ Playbook is up to date</div>
                    </div>
                  )}
                </section>
              )}
              <section className={`${isDark ? 'bg-gray-800' : 'bg-white'} brutal-border rounded-xl md:rounded-2xl p-4 md:p-6 hard-shadow`}>
                <h3 className="font-brutal text-base md:text-xl mb-4 thick-rule pb-4">INTERNAL NOTES</h3>
                <textarea
                  value={notes}
                  onChange={(e) => setNotes(e.target.value)}
                  className={`w-full px-3 md:px-4 py-2 md:py-3 brutal-border-thin rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-200 resize-none font-medium text-sm md:text-base ${isDark ? 'bg-gray-900 text-white' : ''}`}
                  rows={4}
                  placeholder="ADD NOTES..."
                />
                <div className="flex flex-col sm:flex-row gap-2 md:gap-3 mt-4">
                  <button className="brutal-border-thin bg-black text-white px-4 md:px-6 py-2 md:py-3 rounded-full font-black hard-shadow-hover transition-all text-sm md:text-base min-h-[44px]">
                    SAVE CHANGES
                  </button>
                  <EscalateDropdown contract={contract} isDark={isDark} />
                </div>
              </section>
            </div>
          </div>
        </>
      );
    };

    // Export functionality
    const exportToCSV = (contractsToExport, searchQuery) => {
      const headers = ['ID', 'Name', 'Status', 'SLA Days Remaining', 'Value', 'Risk Score', 'Value Label'];
      const rows = contractsToExport.map(c => [
        c.id,
        c.name,
        c.status,
        c.slaDaysRemaining,
        c.value,
        c.riskScore,
        c.valueLabel
      ]);
      
      const csvContent = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', `contracts-export-${new Date().toISOString().split('T')[0]}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // Main App
    function App() {
      const [selectedContract, setSelectedContract] = useState(null);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [exposureModal, setExposureModal] = useState({ isOpen: false, data: null, department: '', clause: '' });
      const [isDark, setIsDark] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [toast, setToast] = useState(null);
      const [filteredContracts, setFilteredContracts] = useState(contracts);

      useEffect(() => {
        if (isDark) {
          document.body.classList.add('dark');
          document.body.classList.remove('bg-white');
          document.body.classList.add('bg-gray-900');
        } else {
          document.body.classList.remove('dark');
          document.body.classList.remove('bg-gray-900');
          document.body.classList.add('bg-white');
        }
      }, [isDark]);

      useEffect(() => {
        if (searchQuery.trim() === '') {
          setFilteredContracts(contracts);
        } else {
          const query = searchQuery.toLowerCase();
          setFilteredContracts(contracts.filter(c => 
            c.name.toLowerCase().includes(query) ||
            c.id.toLowerCase().includes(query) ||
            c.status.toLowerCase().includes(query) ||
            c.valueLabel.toLowerCase().includes(query)
          ));
        }
      }, [searchQuery]);

      const handleRowClick = (contract) => {
        setSelectedContract(contract);
        setIsDrawerOpen(true);
      };

      const handleCloseDrawer = () => {
        setIsDrawerOpen(false);
        setSelectedContract(null);
      };

      const handleExposureCellClick = (key, cellData) => {
        const [department, clause] = key.split('-');
        setExposureModal({
          isOpen: true,
          data: cellData,
          department,
          clause
        });
      };

      const handleToggleDark = () => {
        setIsDark(!isDark);
      };

      const showToast = (message, type = 'info') => {
        setToast({ message, type, id: Date.now() });
      };

      // Make showToast available globally for other components
      useEffect(() => {
        window.showToast = showToast;
        return () => {
          delete window.showToast;
        };
      }, []);

      const handleExport = () => {
        exportToCSV(filteredContracts, searchQuery);
        showToast('Contract data exported successfully!', 'success');
      };

      const handleContractAction = (contract, action) => {
        showToast(`${action} action performed on ${contract.name}`, 'success');
        // Here you would typically update the contract status
      };

      return (
        <div className={`min-h-screen transition-colors ${isDark ? 'bg-gray-900 text-white' : 'bg-white'}`}>
          <TopNav 
            isDark={isDark} 
            onToggleDark={handleToggleDark}
            searchQuery={searchQuery}
            onSearchChange={setSearchQuery}
            onExport={handleExport}
          />
          <div className="mt-8 md:mt-12 px-3 md:px-6 py-4 md:py-8">
            <div className="max-w-7xl mx-auto">
              <h1 className={`font-brutal text-2xl md:text-5xl mb-4 md:mb-8 thick-rule pb-3 md:pb-4 ${isDark ? 'text-white' : ''}`}>
                CONTRACT DASHBOARD
              </h1>
              <PriorityActionPanel 
                contracts={contracts} 
                onContractClick={handleRowClick}
                isDark={isDark}
              />
              <KPIGrid isDark={isDark} />
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 mb-6 md:mb-8">
                <div className="lg:col-span-2">
                  <OrgMetrics isDark={isDark} />
                  <ExposureHeatmap onCellClick={handleExposureCellClick} isDark={isDark} />
                </div>
                <div className="lg:col-span-1">
                  <ActivityFeed activities={recentActivity} isDark={isDark} />
                </div>
              </div>
              {searchQuery && (
                <div className={`${isDark ? 'bg-blue-900' : 'bg-blue-50'} brutal-border rounded-lg p-3 md:p-4 mb-4 md:mb-6`}>
                  <div className="flex items-center justify-between">
                    <span className={`font-bold text-sm md:text-base ${isDark ? 'text-white' : 'text-black'}`}>
                      Showing {filteredContracts.length} of {contracts.length} contracts
                    </span>
                    <button
                      onClick={() => setSearchQuery('')}
                      className={`brutal-border-thin ${isDark ? 'bg-gray-800 text-white' : 'bg-white text-black'} px-3 py-1 rounded-full font-bold text-xs hard-shadow-hover transition-all`}
                    >
                      CLEAR
                    </button>
                  </div>
                </div>
              )}
              <ContractTable contracts={filteredContracts} onRowClick={handleRowClick} onViewClick={handleRowClick} isDark={isDark} />
            </div>
          </div>
          <DetailDrawer
            contract={selectedContract}
            isOpen={isDrawerOpen}
            onClose={handleCloseDrawer}
            isDark={isDark}
          />
          <ExposureAnalysisModal
            isOpen={exposureModal.isOpen}
            onClose={() => setExposureModal({ isOpen: false, data: null, department: '', clause: '' })}
            cellData={exposureModal.data}
            department={exposureModal.department}
            clause={exposureModal.clause}
            isDark={isDark}
          />
          {toast && (
            <Toast
              message={toast.message}
              type={toast.type}
              onClose={() => setToast(null)}
            />
          )}
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
