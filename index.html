    .dark .brutal-border-2 {

    .tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);

      background: #1f2937;
      color: white;

      color: #1f2937;
    }

    }

      top: 100%;
      left: 50%;

      color: white;
      border-radius: 8px;

      color: white;
    }

      from {
        transform: translateX(100%);

      to {

      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);

          const { scrollLeft, scrollWidth, clientWidth } = container;
          const isAtEnd = scrollLeft + clientWidth >= scrollWidth - 10;

        return () => container.removeEventListener('scroll', handleScroll);

                                onClick={(e) => handleDealMemo(e, contract)}
                                title="Generate deal memo"
                              >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                              </button>
                              {tooltips[`deal-${contract.id}`] && (
                                <div className="tooltip tooltip-visible">Generate deal memo</div>
                              )}
                            </div>
                            <SendDropdown contract={contract} isDark={isDark} />
                            <div className="relative flex items-center justify-center">
                              <button 
                                type="button"
                                onClick={(e) => {
                                  e.stopPropagation();
                                  e.preventDefault();
                                  onViewClick(contract);
                                }}

                                onMouseEnter={() => showTooltip(`view-${contract.id}`)}

                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>

                                <div className="tooltip tooltip-visible">View contract details</div>

                          </div>
                          
                          {/* Mobile: Icons with labels */}

                                onClick={(e) => handleDealMemo(e, contract)}
                                title="Generate deal memo"
                              >

                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                              </button>
                              <SendDropdown contract={contract} isDark={isDark} />
                              <button

                                onClick={(e) => {
                                  e.preventDefault();
                                  e.stopPropagation(); // CRITICAL: This stops the row click from interference

                              >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                              </button>
                              <EditDropdown contract={contract} isDark={isDark} />
                            </div>
                            <div className="text-[8px] font-bold" style={{ color: isDark ? 'var(--dark-text-secondary)' : '#6B7280' }}>ACTIONS</div>
                          </div>
                        </td>
                      </tr>
                    ))}

                  </table>
                </div>

            isDark={isDark}

      const [isOpen, setIsOpen] = useState(false);
      const dropdownRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleEscalate = (team) => {
        console.log(`Escalating contract ${contract.id} to ${team}`);
        alert(`Contract escalated to ${team}. They will be notified.`);
        setIsOpen(false);
      };

      return (
        <div className="relative" ref={dropdownRef}>
          <button
            onClick={(e) => {
              e.stopPropagation();
              setIsOpen(!isOpen);

              <div className="bg-green-50 brutal-border-thin rounded-xl p-6 hard-shadow">
                <h3 className="font-brutal text-lg mb-4 border-b-2 border-black pb-2">INTEGRATIONS</h3>
                <div className="grid grid-cols-3 gap-3">
                  {contract.integrations.map((integration, index) => (
                    <IntegrationButton key={index} name={integration} />
                  ))}
                </div>
              </div>
              {contract.playbook && contract.playbook.relevant && (
                <div className="bg-orange-50 brutal-border-thin rounded-xl p-6 hard-shadow">
                  <h3 className="font-brutal text-lg mb-4 border-b-2 border-black pb-2">RELEVANT PLAYBOOK</h3>
                  {contract.playbook.applicablePlaybooks && contract.playbook.applicablePlaybooks.length > 0 && (
                    <div className={`${isDark ? 'bg-gray-900' : 'bg-white'} brutal-border-thin rounded-lg p-4 mb-4`}>
                      <div className={`text-sm font-bold ${isDark ? 'text-gray-300' : 'text-gray-600'} mb-2`}>APPLICABLE PLAYBOOKS:</div>
                      <div className="flex flex-wrap gap-2">
                        {contract.playbook.applicablePlaybooks.map((playbook, index) => (
                          <span key={index} className={`px-3 py-1 rounded-full text-xs font-black brutal-border-thin ${isDark ? 'bg-blue-900 text-white' : 'bg-blue-100 text-black'}`}>
                            {playbook}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  {contract.playbook.updatesNeeded && contract.playbook.updatesNeeded.length > 0 ? (
                    <div className="space-y-3">
                      <div className={`${isDark ? 'bg-red-900' : 'bg-red-100'} brutal-border-thin rounded-lg p-4`}>
                        <div className={`font-black mb-2 flex items-center space-x-2 ${isDark ? 'text-red-200' : 'text-red-800'}`}>
                          <span>⚠️</span>
                          <span>UPDATES NEEDED</span>
                        </div>
                        <ul className="space-y-2">
                          {contract.playbook.updatesNeeded.map((update, index) => (
                            <li key={index} className="flex items-start">
                              <span className={`font-black mr-2 ${isDark ? 'text-red-200' : 'text-red-800'}`}>•</span>
                              <span className={`font-medium ${isDark ? 'text-gray-300' : 'text-gray-800'}`}>{update}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                      <button className="brutal-border-thin bg-black text-white px-6 py-3 rounded-full font-black hard-shadow-hover transition-all w-full">
                        UPDATE PLAYBOOK
                      </button>
                    </div>
                  ) : (
                    <div className={`${isDark ? 'bg-green-900' : 'bg-green-100'} brutal-border-thin rounded-lg p-4`}>
                      <div className={`font-black ${isDark ? 'text-green-200' : 'text-green-800'}`}>✓ Playbook is up to date</div>
                    </div>
                  )}
                </div>
              )}
              <section className={`${isDark ? 'bg-gray-800' : 'bg-white'} brutal-border-thin rounded-2xl p-6 hard-shadow`}>
                <h3 className="font-brutal text-xl mb-4 thick-rule pb-4" style={{ fontFamily: "'Archivo Black', 'Impact', sans-serif" }}>INTERNAL NOTES</h3>
                <textarea
                  value={notes}
                  onChange={(e) => setNotes(e.target.value)}
                  className={`w-full px-4 py-3 brutal-border-thin rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-200 resize-none font-medium ${isDark ? 'bg-gray-900 text-white' : ''}`}
                  rows={4}
                  placeholder="ADD NOTES..."
                />
                <div className="flex space-x-3 mt-4">
                  <button className="brutal-border-thin bg-black text-white px-6 py-3 rounded-full font-black hard-shadow-hover transition-all">
                    SAVE CHANGES
                  </button>
                  <EscalateDropdown contract={contract} isDark={isDark} />
                </div>
              </section>
            </div>
          </div>
        </div>
      );
    };

    // Export functionality
    const exportToCSV = (contractsToExport, searchQuery) => {
      const headers = ['ID', 'Name', 'Status', 'SLA Days Remaining', 'Value', 'Risk Score', 'Value Label'];
      const rows = contractsToExport.map(c => [
        c.id,
        c.name,
        c.status,
        c.slaDaysRemaining,
        c.value,
        c.riskScore,
        c.valueLabel
      ]);
      
      const csvContent = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', `contracts-export-${new Date().toISOString().split('T')[0]}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // Main App
    function App() {
      const [selectedContract, setSelectedContract] = useState(null);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [exposureModal, setExposureModal] = useState({ isOpen: false, data: null, department: '', clause: '' });
      const [isDark, setIsDark] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [toast, setToast] = useState(null);
      const [filteredContracts, setFilteredContracts] = useState(contracts);

      useEffect(() => {
        if (isDark) {
          document.body.classList.add('dark');
          document.body.style.backgroundColor = 'var(--dark-bg-primary)';
          document.body.style.color = 'var(--dark-text-primary)';
        } else {
          document.body.classList.remove('dark');
          document.body.style.backgroundColor = 'var(--light-bg-primary)';
          document.body.style.color = 'var(--light-text-primary)';
        }
      }, [isDark]);

      useEffect(() => {
        if (searchQuery.trim() === '') {
          setFilteredContracts(contracts);
        } else {
          const query = searchQuery.toLowerCase();
          setFilteredContracts(contracts.filter(c => 
            c.name.toLowerCase().includes(query) ||
            c.id.toLowerCase().includes(query) ||
            c.status.toLowerCase().includes(query) ||
            c.valueLabel.toLowerCase().includes(query)
          ));
        }
      }, [searchQuery]);

      const handleRowClick = (contract) => {
        setSelectedContract(contract);
        setIsDrawerOpen(true);
      };

      const handleCloseDrawer = () => {
        setIsDrawerOpen(false);
        setSelectedContract(null);
      };

      const handleExposureCellClick = (key, cellData) => {
        const [department, clause] = key.split('-');
        setExposureModal({
          isOpen: true,
          data: cellData,
          department,
          clause
        });
      };

      const handleToggleDark = () => {
        setIsDark(!isDark);
      };

      const showToast = (message, type = 'info') => {
        setToast({ message, type, id: Date.now() });
      };

      // Make showToast available globally for other components
      useEffect(() => {
        window.showToast = showToast;
        return () => {
          delete window.showToast;
        };
      }, []);

      const handleExport = () => {
        exportToCSV(filteredContracts, searchQuery);
        showToast('Contract data exported successfully!', 'success');
      };

      const handleContractAction = (contract, action) => {
        showToast(`${action} action performed on ${contract.name}`, 'success');
        // Here you would typically update the contract status
      };

      return (
        <div className="min-h-screen transition-colors"
             style={{ 
               backgroundColor: isDark ? 'var(--dark-bg-primary)' : 'var(--light-bg-primary)',
               color: isDark ? 'var(--dark-text-primary)' : 'var(--light-text-primary)',
               margin: 0
             }}>
          <TopNav 
            isDark={isDark} 
            onToggleDark={handleToggleDark}
            searchQuery={searchQuery}
            onSearchChange={setSearchQuery}
            onExport={handleExport}
          />
          <div className="mt-8 md:mt-12 px-3 md:px-6 py-4 md:py-8" style={{ width: '100%' }}>
            <div className="max-w-7xl mx-auto w-full">
              <h1 className="font-brutal text-2xl md:text-5xl mb-4 md:mb-8 thick-rule pb-3 md:pb-4"
                  style={{ color: isDark ? 'var(--dark-text-primary)' : 'var(--light-text-primary)' }}>
                CONTRACT DASHBOARD
              </h1>
              
              {/* Org Health Metrics at the top */}
              <OrgMetrics isDark={isDark} />
              
              <PriorityActionPanel 
                contracts={contracts} 
                onContractClick={handleRowClick}
                isDark={isDark}
              />
              <KPIGrid isDark={isDark} />
              
              {/* Main Content Grid */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 mb-6 md:mb-8">
                <div className="lg:col-span-2 order-1">
                  <ExposureHeatmap onCellClick={handleExposureCellClick} isDark={isDark} />
                </div>
                <div className="lg:col-span-1 order-2">
                  <ActivityFeed activities={recentActivity} isDark={isDark} />
                </div>
              </div>
              {searchQuery && (
                <div className="brutal-border rounded-lg p-3 md:p-4 mb-4 md:mb-6"
                     style={isDark ? { backgroundColor: 'rgba(59, 130, 246, 0.15)', borderColor: 'var(--dark-border)' } : { backgroundColor: '#EFF6FF' }}>
                  <div className="flex items-center justify-between">
                    <span className="font-bold text-sm md:text-base" style={{ color: isDark ? 'var(--dark-text-primary)' : '#000' }}>
                      Showing {filteredContracts.length} of {contracts.length} contracts
                    </span>
                    <button
                      onClick={() => setSearchQuery('')}
                      className="brutal-border-thin px-3 py-1 rounded-full font-bold text-xs hard-shadow-hover transition-all"
                      style={isDark ? { backgroundColor: 'var(--dark-bg-primary)', color: 'var(--dark-text-primary)', borderColor: 'var(--dark-border)' } : { backgroundColor: '#fff', color: '#000' }}
                    >
                      CLEAR
                    </button>
                  </div>
                </div>
              )}
              <ContractTable contracts={filteredContracts} onRowClick={handleRowClick} onViewClick={handleRowClick} isDark={isDark} />
            </div>
          </div>
          <DetailDrawer
            contract={selectedContract}
            isOpen={isDrawerOpen}
            onClose={handleCloseDrawer}
            isDark={isDark}
          />
          <ExposureAnalysisModal
            isOpen={exposureModal.isOpen}
            onClose={() => setExposureModal({ isOpen: false, data: null, department: '', clause: '' })}
            cellData={exposureModal.data}
            department={exposureModal.department}
            clause={exposureModal.clause}
            isDark={isDark}
          />
          {toast && (
            <Toast
              message={toast.message}
              type={toast.type}
              onClose={() => setToast(null)}
            />
          )}
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
